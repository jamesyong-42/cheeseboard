name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  TRUFFLE_SIDECAR_SKIP_DOWNLOAD: "1"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
          - os: linux
            runner: ubuntu-22.04
          - os: windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Generate icons (Unix)
        if: matrix.os != 'windows'
        working-directory: src-tauri/icons
        run: |
          rustc gen_placeholder.rs -o gen_placeholder
          ./gen_placeholder

      - name: Generate icons (Windows)
        if: matrix.os == 'windows'
        working-directory: src-tauri/icons
        shell: pwsh
        run: |
          rustc gen_placeholder.rs -o gen_placeholder.exe
          .\gen_placeholder.exe

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test
