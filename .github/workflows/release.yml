name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-latest
            target: aarch64-apple-darwin

          - name: macos-x64
            runner: macos-latest
            target: x86_64-apple-darwin

          - name: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install system dependencies (Linux)
        if: matrix.name == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate icons (Unix)
        if: matrix.name != 'windows-x64'
        working-directory: src-tauri/icons
        run: |
          rustc gen_placeholder.rs -o gen_placeholder
          ./gen_placeholder

      - name: Generate icons (Windows)
        if: matrix.name == 'windows-x64'
        working-directory: src-tauri/icons
        shell: pwsh
        run: |
          rustc gen_placeholder.rs -o gen_placeholder.exe
          .\gen_placeholder.exe

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cheeseboard ${{ github.ref_name }}"
          releaseBody: |
            Download the installer for your platform below.

            **macOS**: `.dmg` (Apple Silicon or Intel)
            **Windows**: `-setup.exe`
            **Linux**: `.deb` or `.AppImage`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          projectPath: src-tauri

  update-manifest:
    name: Update manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "latest.json" \
            --dir /tmp/manifests || true

      - name: Upload updater manifest
        if: hashFiles('/tmp/manifests/latest.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            /tmp/manifests/latest.json \
            --repo "${{ github.repository }}" \
            --clobber
